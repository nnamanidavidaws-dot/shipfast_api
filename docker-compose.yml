

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     shipfast
      POSTGRES_PASSWORD: shipfast_dev
      POSTGRES_DB:       catalogue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipfast -d catalogue"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: runtime          # use the slim runtime stage
    environment:
      DATABASE_URL: postgresql://shipfast:shipfast_dev@db:5432/catalogue
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: