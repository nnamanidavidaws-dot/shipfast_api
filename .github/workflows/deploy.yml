name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t shipfast:${{ github.sha }} .

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
        run: |
          pip install pytest httpx fastapi sqlalchemy psycopg2-binary boto3 pydantic python-dotenv pyyaml
          python -m pytest test/ -v

      - name: Push to ECR
        run: |
          docker tag shipfast:${{ github.sha }} ${{ secrets.ECR_REGISTRY }}/shipfast/fastapi:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/shipfast/fastapi:${{ github.sha }}

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition shipfast-api \
            --query taskDefinition > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: shipfast-api
          image: ${{ secrets.ECR_REGISTRY }}/shipfast/fastapi:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: shipfast-service
          cluster: shipfast-cluster
          wait-for-service-stability: true