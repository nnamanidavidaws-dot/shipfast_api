name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t shipfast:${{ github.sha }} .

      - name: Run container tests
        run: |
          docker run --rm shipfast:${{ github.sha }} python -m pytest tests/ -v

      - name: Push to ECR
        run: |
          docker tag shipfast:${{ github.sha }} ${{ secrets.ECR_REGISTRY }}/shipfast/fastapi:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/shipfast/fastapi:${{ github.sha }}

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster shipfast-cluster \
            --service shipfast-service \
            --image-id ${{ secrets.ECR_REGISTRY }}/shipfast/fastapi:${{ github.sha }} \
            --force-new-deployment

      - name: Wait for deployment to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster shipfast-cluster \
            --services shipfast-service \
            --region us-east-1